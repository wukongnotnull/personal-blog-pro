name: Database Migration

on:
  push:
    branches:
      - main      # 生产环境迁移
      - dev       # 开发环境迁移（可选）
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to migrate (main or dev)'
        required: true
        default: 'main'

jobs:
  migrate-production:
    name: Migrate Production (main)
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' || github.event.inputs.branch == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run production migrations
        run: |
          npx prisma generate

          # Run migrate deploy, but allow it to fail gracefully if database needs baseline
          MIGRATE_OUTPUT=$(npx prisma migrate deploy 2>&1) || true
          echo "$MIGRATE_OUTPUT"

          # If P3005 error (database not empty), mark initial migration as applied
          if echo "$MIGRATE_OUTPUT" | grep -q "P3005"; then
            echo "Database schema already exists, marking initial migration as applied..."
            npx prisma migrate resolve --applied 20260408_init || true
            echo "Migration baseline complete."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify database connection
        run: npx prisma db execute --stdin <<< "SELECT 1"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  migrate-dev:
    name: Migrate Development (dev)
    runs-on: ubuntu-latest
    environment: development
    if: github.ref == 'refs/heads/dev' || github.event.inputs.branch == 'dev'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run development migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}

      - name: Verify database connection
        run: npx prisma db execute --stdin <<< "SELECT 1"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
